x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    PYTHONPATH: /opt/airflow
    WAREHOUSE_DSN: postgresql://warehouse:warehouse@warehouse-postgres:5432/warehouse
    WAREHOUSE_HOST: warehouse-postgres
    WAREHOUSE_PORT: "5432"
    WAREHOUSE_USER: warehouse
    WAREHOUSE_PASSWORD: warehouse
    WAREHOUSE_DB: warehouse
    DBT_PROFILES_DIR: /opt/airflow/dbt_worldbank
    _PIP_ADDITIONAL_REQUIREMENTS: "requests>=2.31 psycopg[binary]>=3.1 dbt-postgres>=1.7,<1.10 dbt-core>=1.7,<1.10"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./worldbank_extractor:/opt/airflow/worldbank_extractor
    - ./load:/opt/airflow/load
    - ./dbt_worldbank:/opt/airflow/dbt_worldbank
  depends_on: &airflow-common-depends
    airflow-postgres:
      condition: service_healthy

services:
  warehouse-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    ports:
      - "5433:5432"
    volumes:
      - warehouse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "warehouse"]
      interval: 5s
      retries: 5

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >-
        airflow db migrate &&
        airflow users create --username admin --password admin
        --firstname admin --lastname admin --role Admin --email admin@example.com
    restart: on-failure

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
    restart: always

volumes:
  warehouse-data:
  airflow-db:
