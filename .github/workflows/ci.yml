name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: warehouse
          POSTGRES_PASSWORD: warehouse
          POSTGRES_DB: warehouse
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U warehouse"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      WAREHOUSE_DSN: postgresql://warehouse:warehouse@localhost:5433/warehouse
      WAREHOUSE_HOST: localhost
      WAREHOUSE_PORT: "5433"
      WAREHOUSE_USER: warehouse
      WAREHOUSE_PASSWORD: warehouse
      WAREHOUSE_DB: warehouse
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_worldbank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -v
      - name: Siembra un fixture raw determinista para dbt
        run: |
          python - <<'PY'
          import os
          import psycopg
          from load.postgres_loader import asegurar_esquema, upsert_paises, upsert_valores
          from worldbank_extractor.models import FilaPais, FilaValor

          conn = psycopg.connect(os.environ["WAREHOUSE_DSN"])
          asegurar_esquema(conn)
          upsert_paises(conn, [
              FilaPais("USA", "US", "United States", "North America",
                       "High income", "Washington D.C.", -77.0, 38.9),
              FilaPais("COL", "CO", "Colombia", "Latin America & Caribbean",
                       "Upper middle income", "Bogota", -74.1, 4.6),
          ])
          upsert_valores(conn, [
              FilaValor("SP.POP.TOTL", "USA", 2020, 331_000_000.0),
              FilaValor("NY.GDP.PCAP.CD", "USA", 2020, 63_000.0),
              FilaValor("SP.DYN.LE00.IN", "COL", 2020, 74.8),
          ])
          PY
      - name: dbt build (modelos + tests)
        working-directory: dbt_worldbank
        run: |
          dbt deps
          dbt seed
          dbt run
          dbt test
      - name: Verifica que la tabla de hechos no este vacia
        run: |
          python - <<'PY'
          import os
          import psycopg
          conn = psycopg.connect(os.environ["WAREHOUSE_DSN"])
          with conn.cursor() as cur:
              cur.execute("select count(*) from marts.hechos_valor_indicador")
              n = cur.fetchone()[0]
          print("filas de hechos_valor_indicador:", n)
          assert n > 0, "la tabla de hechos esta vacia - el pipeline no produjo datos"
          PY
