name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: warehouse
          POSTGRES_PASSWORD: warehouse
          POSTGRES_DB: warehouse
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U warehouse"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      WAREHOUSE_DSN: postgresql://warehouse:warehouse@localhost:5433/warehouse
      WAREHOUSE_HOST: localhost
      WAREHOUSE_PORT: "5433"
      WAREHOUSE_USER: warehouse
      WAREHOUSE_PASSWORD: warehouse
      WAREHOUSE_DB: warehouse
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_worldbank
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -v
      - name: Seed a deterministic raw fixture for dbt
        run: |
          python - <<'PY'
          import os
          import psycopg
          from load.postgres_loader import ensure_schema, upsert_countries, upsert_values
          from worldbank_extractor.models import CountryRow, ValueRow

          conn = psycopg.connect(os.environ["WAREHOUSE_DSN"])
          ensure_schema(conn)
          upsert_countries(conn, [
              CountryRow("USA", "US", "United States", "North America",
                         "High income", "Washington D.C.", -77.0, 38.9),
              CountryRow("COL", "CO", "Colombia", "Latin America & Caribbean",
                         "Upper middle income", "Bogota", -74.1, 4.6),
          ])
          upsert_values(conn, [
              ValueRow("SP.POP.TOTL", "USA", 2020, 331_000_000.0),
              ValueRow("NY.GDP.PCAP.CD", "USA", 2020, 63_000.0),
              ValueRow("SP.DYN.LE00.IN", "COL", 2020, 74.8),
          ])
          PY
      - name: dbt build
        working-directory: dbt_worldbank
        run: |
          dbt deps
          dbt seed
          dbt run
          dbt test
      - name: Assert the fact table is non-empty
        run: |
          python - <<'PY'
          import os
          import psycopg
          conn = psycopg.connect(os.environ["WAREHOUSE_DSN"])
          with conn.cursor() as cur:
              cur.execute("select count(*) from marts.fact_indicator_value")
              n = cur.fetchone()[0]
          print("fact_indicator_value rows:", n)
          assert n > 0, "fact table is empty - pipeline produced no data"
          PY
